name: "Get Involved"
description: "Say hello — we'll take it from there."
title: "Get involved: [your name]"
labels: ["get-involved"]
body:
  - type: markdown
    attributes:
      value: |
        No form to fill out, just say hi. Tell us who you are and what's on your mind — we'll take it from there.

  - type: textarea
    id: message
    attributes:
      label: "Who are you and what brings you here?"
      placeholder: "Hey, I'm [name] from [company/project]. I've been working with MySQL for X years and I'm interested in..."
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        This issue is public. You can also reach us at [contact@oursqlfoundation.org](mailto:contact@oursqlfoundation.org).
