<header class="site-header">
  <div class="header-inner">
    <a href="/" class="site-logo" aria-label="OurSQL Foundation">
      <img src="/oursql-foundation-logo-dark.svg" class="logo-img logo-img--dark" alt="OurSQL Foundation" height="36">
      <img src="/oursql-foundation-logo-light.svg" class="logo-img logo-img--light" alt="OurSQL Foundation" height="36">
    </a>

    <nav class="site-nav" id="site-nav" aria-label="Main navigation">
      <a href="/resources/" class="{{ if and (hasPrefix .RelPermalink "/resources") (not (hasPrefix .RelPermalink "/resources/press")) (not (hasPrefix .RelPermalink "/resources/contribute")) }}active{{ end }}">Resources</a>
      <a href="/resources/press/" class="{{ if hasPrefix .RelPermalink "/resources/press" }}active{{ end }}">Press & News</a>
      <a href="/resources/contribute/" class="nav-cta">Suggest a resource</a>
    </nav>

    <div class="header-right">
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="site-nav">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle colour theme">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/>
          <path d="M9 18h6"/>
          <path d="M10 22h4"/>
        </svg>
      </button>
    </div>
  </div>
</header>
