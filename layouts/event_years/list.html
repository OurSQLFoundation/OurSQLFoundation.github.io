{{ define "main" }}
<div class="resources-section">

  <div class="resources-section-header">
    <nav class="resources-breadcrumb" aria-label="Breadcrumb">
      <a href="/resources/">Resources</a>
      <span class="breadcrumb-sep" aria-hidden="true">/</span>
      <span>{{ .Data.Plural | title }}</span>
    </nav>
    <h1 class="resources-section-title">{{ .Data.Plural | title }}</h1>
  </div>

  <div class="taxonomy-terms-grid">
    {{ range .Data.Terms.ByCount }}
    <a href="{{ .Page.RelPermalink }}" class="taxonomy-term-card">
      <span class="taxonomy-term-name">{{ .Page.Title }}</span>
      <span class="taxonomy-term-count">{{ .Count }}</span>
    </a>
    {{ end }}
  </div>

</div>
{{ end }}
